<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Connexion — NLP Annotation</h2>

            <div th:if="${param.error}" class="alert alert-danger">Identifiants invalides. Veuillez réessayer.</div>
            <div th:if="${param.logout}" class="alert alert-success">Déconnexion réussie.</div>

            <form th:action="@{/login}" method="post" class="card p-4">
                <div class="mb-3">
                    <label for="username" class="form-label">Login</label>
                    <input type="text" id="username" name="username"class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" id="password" name="password"class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Se connecter</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
