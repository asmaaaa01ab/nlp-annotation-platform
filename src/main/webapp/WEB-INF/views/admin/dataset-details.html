<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Détails du dataset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <h2 th:text="${dataset.nomDataset}"></h2>

    <!-- Infos dataset -->
    <div class="card mb-4">
        <div class="card-body">
            <p><strong>Description :</strong>
                <span th:text="${dataset.description}"></span>
            </p>
            <p><strong>Taille :</strong>
                <span th:text="${taille}"></span> couples
            </p>
            <p><strong>Avancement global :</strong>
                <span th:text="${avancement}"></span>%
            </p>
            <p><strong>Classes :</strong>
                <!-- classes = List<ClassePossible> -->
                <span th:each="classe, i : ${classes}">
                    <span th:text="${classe.texteClasse}"></span>
                    <span th:unless="${i.last}"> / </span>
                </span>
            </p>

            <div class="d-flex gap-2">
                <a th:href="@{/admin/dataset/{id}/annotateurs/liste(id=${dataset.id})}"
                   class="btn btn-info">
                    Voir annotateurs
                </a>
                <a th:href="@{/admin/dataset/{id}/annotateurs(id=${dataset.id})}"
                   class="btn btn-warning">
                    Ajouter annotateurs
                </a>
                <a th:href="@{/admin/dataset/{id}/export/csv(id=${dataset.id})}"
                   class="btn btn-success">
                    Export CSV
                </a>
                <a th:href="@{/admin/dataset/{id}/export/json(id=${dataset.id})}"
                   class="btn btn-secondary">
                    Export JSON
                </a>
            </div>
        </div>
    </div>

    <!-- Liste des couples -->
    <div class="card">
        <div class="card-header">
            Couples de textes
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Texte 1</th>
                        <th>Texte 2</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- couples = List<CoupleTexte> -->
                    <tr th:each="couple : ${couples}">
                        <td th:text="${couple.id}"></td>
                        <td th:text="${couple.texte1}"></td>
                        <td th:text="${couple.texte2}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
