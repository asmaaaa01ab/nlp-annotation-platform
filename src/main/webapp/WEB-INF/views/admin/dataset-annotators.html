<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Annotateurs du dataset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <h2>Annotateurs —
        <span th:text="${dataset.nomDataset}"></span>
    </h2>

    <div class="card">
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Login</th>
                        <th>Avancement</th>
                        <th>Date limite</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- taches = List<Tache> -->
                    <tr th:each="tache : ${taches}">
                        <td th:text="${tache.annotateur.nom}"></td>
                        <td th:text="${tache.annotateur.prenom}"></td>
                        <td th:text="${tache.annotateur.login}"></td>
                        <td>
                            <div class="progress">
                                <div class="progress-bar"
                                     th:style="'width:' + ${tache.avancement} + '%'"
                                     th:text="${tache.avancement} + '%'">
                                </div>
                            </div>
                        </td>
                        <td th:text="${tache.dateLimite}"></td>
                    </tr>
                </tbody>
            </table>

            <a th:href="@{/admin/dataset/{id}/details(id=${dataset.id})}"
               class="btn btn-secondary mt-2">
                Retour aux détails
            </a>
        </div>
    </div>
</div>
</body>
</html>
