<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Créer un Dataset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <h2>Créer un Dataset</h2>

    <div th:if="${erreur}" class="alert alert-danger">
        <span th:text="${erreur}"></span>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/dataset/creer}" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="nom" class="form-label">Nom du Dataset</label>
                    <input type="text" id="nom" name="nom" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description" name="description" class="form-control" rows="3" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="classes" class="form-label">Classes possibles (séparées par des <strong>points-virgules</strong>)</label>
                    <textarea id="classes" name="classes" class="form-control" rows="3"
                              placeholder="Ex: positive;negative;neutral" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="fichier" class="form-label">Fichier CSV ou JSON</label>
                    <input type="file" id="fichier" name="fichier" class="form-control"
                           accept=".csv,.json" required>
                    <div class="form-text">Formats acceptés : .csv (colonnes texte1,texte2) ou .json</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Créer</button>
                    <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
