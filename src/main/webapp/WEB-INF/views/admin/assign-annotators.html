<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Affecter des annotateurs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <h2>Affecter des annotateurs —
        <span th:text="${dataset.nomDataset}"></span>
    </h2>

    <div th:if="${erreur}" class="alert alert-danger"
         th:text="${erreur}">
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/dataset/{id}/annotateurs(id=${dataset.id})}"
                  method="post">

                <!-- Deadline -->
                <div class="mb-3">
                    <label for="deadline" class="form-label">
                        Date limite
                    </label>
                    <input type="date" id="deadline" name="deadline"
                           class="form-control" required>
                </div>

                <!-- Table annotateurs avec checkbox -->
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Sélectionner</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Login</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- annotateurs = List<Utilisateur> -->
                        <tr th:each="annotateur : ${annotateurs}">
                            <td>
                                <input type="checkbox"
                                       name="annotateurIds"
                                       th:value="${annotateur.id}">
                            </td>
                            <td th:text="${annotateur.nom}"></td>
                            <td th:text="${annotateur.prenom}"></td>
                            <td th:text="${annotateur.login}"></td>
                        </tr>
                    </tbody>
                </table>

                <button type="submit" class="btn btn-primary">
                    Valider l'affectation
                </button>
                <a th:href="@{/admin/dashboard}"
                   class="btn btn-secondary">
                    Annuler
                </a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
