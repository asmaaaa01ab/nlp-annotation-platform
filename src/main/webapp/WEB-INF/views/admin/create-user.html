<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Créer un annotateur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <h2>Créer un annotateur</h2>

    <div th:if="${erreur}" class="alert alert-danger"
         th:text="${erreur}">
    </div>

    <div class="card">
        <div class="card-body">
            <!-- action = /admin/annotateur/creer -->
            <form th:action="@{/admin/annotateur/creer}" method="post">
                <div class="mb-3">
                    <label for="nom" class="form-label">Nom</label>
                    <input type="text" id="nom" name="nom"
                           class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="prenom" class="form-label">Prénom</label>
                    <input type="text" id="prenom" name="prenom"
                           class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="login" class="form-label">Login</label>
                    <input type="text" id="login" name="login"
                           class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email"
                           class="form-control" required>
                </div>
                <p class="text-muted">
                    Le mot de passe sera généré automatiquement
                    et envoyé par email.
                </p>
                <button type="submit" class="btn btn-primary">
                    Créer
                </button>
                <a th:href="@{/admin/annotateurs}"
                   class="btn btn-secondary">
                    Annuler
                </a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
