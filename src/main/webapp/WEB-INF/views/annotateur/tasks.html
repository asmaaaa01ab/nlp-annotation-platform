<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes Tâches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <h2>Mes Tâches</h2>

    <div th:if="${#lists.isEmpty(taches)}" class="alert alert-info">
        Aucune tâche assignée pour le moment.
    </div>

    <div class="card" th:unless="${#lists.isEmpty(taches)}">
        <div class="card-header">Tâches assignées</div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom du dataset</th>
                        <th>Date limite</th>
                        <th>Avancement</th>
                        <th>Taille</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- taches = List<Tache> envoyé par TacheService -->
                    <tr th:each="tache : ${taches}">
                        <td th:text="${tache.id}"></td>
                        <td th:text="${tache.dataset.nomDataset}"></td>
                        <td th:text="${tache.dateLimite}"></td>
                        <td>
                            <div class="progress">
                                <div class="progress-bar"
                                     th:style="'width:' + ${tache.avancement} + '%'"
                                     th:text="${tache.avancement} + '%'">
                                </div>
                            </div>
                        </td>
                        <!-- taille_X = attribut ajouté dans le controller -->
                        <td th:text="${tailleMap[tache.id]}"></td>
                        <td>
                            <a th:href="@{/annotateur/tache/{id}/travailler(id=${tache.id})}"
                               class="btn btn-primary btn-sm">
                                Travailler
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
