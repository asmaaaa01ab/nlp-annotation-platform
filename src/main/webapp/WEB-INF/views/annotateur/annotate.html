<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Annoter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <h2>Annoter — <span th:text="${tache.dataset.nomDataset}"></span></h2>

    <!-- Message erreur spam -->
    <div th:if="${erreur}" class="alert alert-danger"
         th:text="${erreur}">
    </div>

    <!-- Tâche terminée -->
    <div th:if="${couple == null}" class="alert alert-success">
        Félicitations ! Vous avez terminé toutes vos annotations.
        <a th:href="@{/annotateur/taches}" class="btn btn-primary ms-3">
            Retour aux tâches
        </a>
    </div>

    <!-- Interface annotation -->
    <div th:unless="${couple == null}" class="card">
        <div class="card-body">
            <p><strong>ID Couple :</strong>
                <span th:text="${couple.id}"></span>
            </p>
            <p><strong>Texte 1 :</strong>
                <span th:text="${couple.texte1}"></span>
            </p>
            <p><strong>Texte 2 :</strong>
                <span th:text="${couple.texte2}"></span>
            </p>

            <!-- action = /annotateur/tache/{id}/annoter -->
            <form th:action="@{/annotateur/tache/{id}/annoter(id=${tache.id})}"
                  method="post">
                <input type="hidden" name="coupleId"
                       th:value="${couple.id}">

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        Choisir une classe :
                    </label>
                    <!-- classes = List<ClassePossible> -->
                    <div th:each="classe : ${classes}">
                        <div class="form-check">
                            <input class="form-check-input"
                                   type="radio"
                                   name="classe"
                                   th:id="${'classe-' + classe.id}"
                                   th:value="${classe.texteClasse}"
                                   required>
                            <label class="form-check-label"
                                   th:for="${'classe-' + classe.id}"
                                   th:text="${classe.texteClasse}">
                            </label>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/annotateur/taches}"
                       class="btn btn-secondary">
                        Retour aux tâches
                    </a>
                    <button type="submit" class="btn btn-success">
                        Valider et suivant
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
