<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"
     th:fragment="header">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin/dashboard}">
            Annotation NLP
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"
                    sec:authorize="hasAuthority('ADMIN_ROLE')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">Tableau de bord</a>
                </li>
                <li class="nav-item"
                    sec:authorize="hasAuthority('ADMIN_ROLE')">
                    <a class="nav-link" th:href="@{/admin/annotateurs}">Gérer annotateurs</a>
                </li>
                <li class="nav-item"
                    sec:authorize="hasAuthority('ANNOTATEUR_ROLE')">
                    <a class="nav-link" th:href="@{/annotateur/taches}">Mes tâches</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <span class="nav-link text-light">
                        <sec:authentication property="name"/>
                    </span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">Déconnexion</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
